name: Publish to npm

# Both event sources stay wired so a published GitHub Release and a raw
# `v*` tag push both fire a publish. The shared release-preflight script
# makes reruns idempotent: if a package version is already on npm it is
# skipped, so duplicate triggers do not produce duplicate publishes.
on:
  release:
    types: [published]
  push:
    tags:
      - "v*"

concurrency:
  group: publish-${{ github.ref_name || github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required for npm provenance attestations.
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify version alignment (core, cli, git tag)
        run: node packages/cli/scripts/release-preflight.js check-versions --require-tag

      - name: Typecheck (core + cli)
        run: pnpm typecheck

      - name: Test (core + cli)
        run: pnpm test

      - name: Build (core then cli)
        run: pnpm build

      - name: Verify packed CLI pins core to exact version
        run: node packages/cli/scripts/release-preflight.js verify-packed-cli

      - name: Compute publish plan
        id: plan
        run: node packages/cli/scripts/release-preflight.js publish-plan --github

      - name: Publish @mindfoldhq/trellis-core
        if: steps.plan.outputs.core_publish == 'true'
        run: pnpm publish --access public --no-git-checks --tag ${{ steps.plan.outputs.tag }}
        working-directory: packages/core
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"

      - name: Skip @mindfoldhq/trellis-core (already on npm)
        if: steps.plan.outputs.core_publish != 'true'
        run: echo "@mindfoldhq/trellis-core@${{ steps.plan.outputs.version }} already published; skipping."

      - name: Publish @mindfoldhq/trellis
        if: steps.plan.outputs.cli_publish == 'true'
        run: pnpm publish --access public --no-git-checks --tag ${{ steps.plan.outputs.tag }}
        working-directory: packages/cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"

      - name: Skip @mindfoldhq/trellis (already on npm)
        if: steps.plan.outputs.cli_publish != 'true'
        run: echo "@mindfoldhq/trellis@${{ steps.plan.outputs.version }} already published; skipping."

      - name: Verify published packages on public npm
        run: node packages/cli/scripts/release-preflight.js verify-npm --package all
